services:

  db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_USER:     coworking_user
      POSTGRES_PASSWORD: coworking_pass
      POSTGRES_DB:       authdb
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coworking_user -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: .
    container_name: coworking_auth
    ports:
      - "8001:8001"
    environment:
      TZ: America/Caracas
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  auth_postgres_data:

networks:
    default:
      external: true
      name: coworking_net

