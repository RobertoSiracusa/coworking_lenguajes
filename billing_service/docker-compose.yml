version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: billing_db
    environment:
      POSTGRES_USER:     coworking_user
      POSTGRES_PASSWORD: coworking_pass
      POSTGRES_DB:       billingdb
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coworking_user -d billingdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  billing-service:
    build: .
    container_name: coworking_billing
    ports:
      - "8004:8004"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  billing_postgres_data:
